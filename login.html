<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FD Scanner — Login</title>
<style>
body { margin:0; background:#22224C; display:flex; align-items:center; justify-content:center; min-height:100vh; font-family:-apple-system,sans-serif; }
.msg { color:white; text-align:center; font-size:16px; opacity:0.7; }
</style>
</head>
<body>
<div class="msg" id="msg">Logging in...</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var tg = params.get('tg') || params.get('fd');
  if (tg) {
    try {
      var b64    = decodeURIComponent(tg).replace(/-/g,'+').replace(/_/g,'/');
      var padded = b64 + '=='.slice(0,(4-b64.length%4)%4);
      var parsed = JSON.parse(atob(padded));
      if (parsed.u && parsed.k && parsed.s) {
        localStorage.setItem('fd_cfg', JSON.stringify(parsed));
        document.getElementById('msg').textContent = 'Logged in — opening scanner...';
        setTimeout(function() { window.location.href = 'index.html'; }, 500);
        return;
      }
    } catch(e) {
      document.getElementById('msg').textContent = 'Login failed — please try again';
    }
  }
  document.getElementById('msg').textContent = 'No credentials found — redirecting...';
  setTimeout(function() { window.location.href = 'index.html'; }, 1000);
})();
</script>
</body>
</html>
